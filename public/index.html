<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jesse AI</title>
    <link rel="stylesheet" href="style.css" />
    <!-- Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  </head>
  <body>
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <circle cx="14" cy="14" r="14" fill="#10a37f"/>
            <path d="M8 14.5l4 4 8-9" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>Jesse AI</span>
        </div>
        <button id="newChatBtn" class="new-chat-btn" title="New chat">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
      </div>
      <div class="sidebar-content">
        <p class="sidebar-label">Current Session</p>
        <div id="sessionIndicator" class="session-item active">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
          <span>New conversation</span>
        </div>
      </div>
      <div class="sidebar-footer">
        <p class="sidebar-hint">Powered by Groq</p>
      </div>
    </aside>

    <!-- Main chat area -->
    <main class="main">
      <!-- Top bar -->
      <header class="topbar">
        <button class="menu-toggle" id="menuToggle" aria-label="Toggle sidebar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <span class="model-badge">LLaMA 3 · Groq</span>
      </header>

      <!-- Messages container -->
      <div class="messages-container" id="messagesContainer">
        <!-- Welcome screen -->
        <div class="welcome-screen" id="welcomeScreen">
          <div class="welcome-icon">
            <svg width="48" height="48" viewBox="0 0 28 28" fill="none">
              <circle cx="14" cy="14" r="14" fill="#10a37f"/>
              <path d="M8 14.5l4 4 8-9" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <h1>How can I help you today?</h1>
          <p>Ask me anything — I'm here to chat, explain, brainstorm, and more.</p>
          <div class="suggestions">
            <button class="suggestion-chip" data-prompt="Explain quantum computing in simple terms">Explain quantum computing</button>
            <button class="suggestion-chip" data-prompt="Write a short poem about the ocean">Write a poem</button>
            <button class="suggestion-chip" data-prompt="Give me 5 tips for being more productive">Productivity tips</button>
            <button class="suggestion-chip" data-prompt="What are the pros and cons of electric cars?">Electric cars pros & cons</button>
          </div>
        </div>

        <!-- Messages will be injected here -->
        <div class="messages" id="messages"></div>
      </div>

      <!-- Input area -->
      <div class="input-area">
        <div class="input-wrapper">
          <textarea
            id="messageInput"
            placeholder="Message Jesse AI..."
            rows="1"
            autocomplete="off"
            spellcheck="true"
          ></textarea>
          <button id="sendBtn" class="send-btn" disabled aria-label="Send message">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
            </svg>
          </button>
        </div>
        <p class="input-hint">Jesse AI can make mistakes. Verify important information.</p>
      </div>
    </main>

    <script src="app.js"></script>
  </body>
</html>
