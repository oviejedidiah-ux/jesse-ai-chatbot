<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title id="pageTitle">Jesse AI</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  </head>
  <body>

    <!-- Name setup modal -->
    <div class="modal-overlay" id="nameModal">
      <div class="modal">
        <div class="modal-icon">
          <svg width="40" height="40" viewBox="0 0 28 28" fill="none">
            <circle cx="14" cy="14" r="14" fill="#10a37f"/>
            <path d="M8 14.5l4 4 8-9" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <h2>Welcome! 👋</h2>
        <p>What would you like to call your AI?</p>
        <input type="text" id="aiNameInput" placeholder="e.g. Alex, Nova, Buddy..." maxlength="20" />
        <button id="saveNameBtn" class="save-name-btn">Let's go</button>
      </div>
    </div>

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <circle cx="14" cy="14" r="14" fill="#10a37f"/>
            <path d="M8 14.5l4 4 8-9" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span id="sidebarName">Jesse AI</span>
        </div>
        <button id="newChatBtn" class="new-chat-btn" title="New chat">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
      </div>
      <div class="sidebar-content">
        <p class="sidebar-label">Chat History</p>
        <div id="chatHistory"></div>
      </div>
      <div class="sidebar-footer">
        <div class="mood-bar" id="moodBar">
          <span class="mood-dot" id="moodDot"></span>
          <span class="mood-label" id="moodLabel">Mood: Neutral</span>
        </div>
        <button class="theme-toggle" id="themeToggle" title="Toggle light/dark mode">
          <span id="themeIcon">☀️</span>
          <span id="themeText">Light mode</span>
        </button>
        <p class="sidebar-hint">Powered by OpenRouter</p>
      </div>
    </aside>

    <!-- Main chat area -->
    <main class="main">
      <header class="topbar">
        <button class="menu-toggle" id="menuToggle" aria-label="Toggle sidebar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <span id="topbarName" class="model-badge">Jesse AI · Groq</span>
      </header>

      <div class="messages-container" id="messagesContainer">
        <div class="welcome-screen" id="welcomeScreen">
          <div class="welcome-icon">
            <svg width="48" height="48" viewBox="0 0 28 28" fill="none">
              <circle cx="14" cy="14" r="14" fill="#10a37f"/>
              <path d="M8 14.5l4 4 8-9" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <h1 id="welcomeTitle">How can I help you today?</h1>
          <p>Ask me anything — I'm here to chat, explain, brainstorm, and more.</p>
          <div class="suggestions">
            <button class="suggestion-chip" data-prompt="Explain quantum computing in simple terms">Explain quantum computing</button>
            <button class="suggestion-chip" data-prompt="Write a short poem about the ocean">Write a poem</button>
            <button class="suggestion-chip" data-prompt="Give me 5 tips for being more productive">Productivity tips</button>
            <button class="suggestion-chip" data-prompt="What are the pros and cons of electric cars?">Electric cars pros & cons</button>
          </div>
        </div>
        <div class="messages" id="messages"></div>
      </div>

      <div class="input-area">
        <div class="input-wrapper">
          <button id="voiceBtn" class="voice-btn" title="Speak your message" aria-label="Voice input">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
              <line x1="12" y1="19" x2="12" y2="23"/>
              <line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
          </button>
          <textarea
            id="messageInput"
            placeholder="Message your AI..."
            rows="1"
            autocomplete="off"
            spellcheck="true"
          ></textarea>
          <button id="sendBtn" class="send-btn" disabled aria-label="Send message">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
            </svg>
          </button>
        </div>
        <p class="input-hint" id="inputHint">Jesse AI can make mistakes. Verify important information.</p>
      </div>
    </main>

    <script src="app.js?v=14"></script>
  </body>
</html>
